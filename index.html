<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Space Invaders Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Space Invaders">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ width:100%; height:100%; overflow:hidden; background:#000; }
body { font-family:'Orbitron',monospace; touch-action:none; }
#wrapper {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
#canvasContainer {
  position:relative;
  transform-origin:center center;
  flex-shrink:0;
}
canvas { display:block; cursor:crosshair; }
#touchOverlay {
  display:none;
  position:absolute; top:0; left:0;
  pointer-events:none;
  z-index:10;
}
#touchOverlay.active { display:block; }
#mPauseBtn, #mMenuBtn {
  position:absolute; pointer-events:all;
  width:44px; height:44px; border-radius:8px;
  display:none;
  align-items:center; justify-content:center;
  font-size:18px; cursor:pointer;
  border:1.5px solid rgba(200,200,255,0.3);
  background:rgba(0,0,30,0.7);
  color:#fff; top:8px; z-index:20;
  -webkit-tap-highlight-color:transparent;
}
#mPauseBtn { right:60px; }
#mMenuBtn  { right:10px; }
#mPauseBtn, #mMenuBtn { top:6px; width:40px; height:44px; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="touchOverlay"></div>
    <div id="mPauseBtn">⏸</div>
    <div id="mMenuBtn">🏠</div>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('wrapper');
const canvasContainer = document.getElementById('canvasContainer');
const touchOverlay = document.getElementById('touchOverlay');
const mPauseBtn = document.getElementById('mPauseBtn');
const mMenuBtn = document.getElementById('mMenuBtn');

// ── RESPONSIVE SIZING ─────────────────────────────────────────────────────
const BASE_W=400, BASE_H=700;
let scale=1;
const rotated=false;
function resize(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  scale = Math.min(vw / BASE_W, vh / BASE_H);
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width  = BASE_W + 'px';
  canvas.style.height = BASE_H + 'px';
  canvasContainer.style.width  = BASE_W + 'px';
  canvasContainer.style.height = BASE_H + 'px';
  canvasContainer.style.transform = `scale(${scale})`;
  touchOverlay.style.width  = BASE_W + 'px';
  touchOverlay.style.height = BASE_H + 'px';
}
resize();
window.addEventListener('resize', resize);

// Detect mobile
const isMobile = /Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent) || window.innerWidth<600;
let mobileMode = isMobile;
if(mobileMode) touchOverlay.classList.add('active');

// ── AUDIO ─────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }
function playShoot(){
  resumeAC();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type='square';o.frequency.setValueAtTime(880,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(220,AC.currentTime+0.08);
  g.gain.setValueAtTime(0.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.start();o.stop(AC.currentTime+0.1);
}
function playExplosion(big=false){
  resumeAC();
  const buf=AC.createBuffer(1,AC.sampleRate*(big?0.6:0.25),AC.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,big?1.5:2);
  const src=AC.createBufferSource(),g=AC.createGain();
  src.buffer=buf;src.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(big?0.7:0.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+(big?0.6:0.25));
  src.start();src.stop(AC.currentTime+(big?0.6:0.25));
  if(big){const o=AC.createOscillator(),g2=AC.createGain();o.connect(g2);g2.connect(AC.destination);o.type='sine';o.frequency.setValueAtTime(80,AC.currentTime);o.frequency.exponentialRampToValueAtTime(20,AC.currentTime+0.5);g2.gain.setValueAtTime(0.4,AC.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);o.start();o.stop(AC.currentTime+0.5);}
}
function playPlayerHit(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.setValueAtTime(300,AC.currentTime);o.frequency.exponentialRampToValueAtTime(80,AC.currentTime+0.3);g.gain.setValueAtTime(0.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);o.start();o.stop(AC.currentTime+0.3);}
function playPowerup(){resumeAC();[440,660,880].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,AC.currentTime+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.07+0.12);o.start(AC.currentTime+i*0.07);o.stop(AC.currentTime+i*0.07+0.12);});}
function playLevelUp(){resumeAC();[523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.2,AC.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.1+0.15);o.start(AC.currentTime+i*0.1);o.stop(AC.currentTime+i*0.1+0.15);});}
function playBossAlert(){resumeAC();[220,330,440,330,220,440].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.2,AC.currentTime+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.12+0.1);o.start(AC.currentTime+i*0.12);o.stop(AC.currentTime+i*0.12+0.1);});}
function playBossHit(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(200,AC.currentTime);o.frequency.exponentialRampToValueAtTime(100,AC.currentTime+0.15);g.gain.setValueAtTime(0.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.15);o.start();o.stop(AC.currentTime+0.15);}
let bossMusicNodes=[];
function startBossMusic(){stopBossMusic();function pulse(){if(state!==S.PLAYING||!boss)return;resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.value=55;g.gain.setValueAtTime(0,AC.currentTime);g.gain.linearRampToValueAtTime(0.15,AC.currentTime+0.05);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.4);o.start();o.stop(AC.currentTime+0.4);bossMusicNodes.push(setTimeout(pulse,500));}pulse();}
function stopBossMusic(){bossMusicNodes.forEach(t=>clearTimeout(t));bossMusicNodes=[];}

// ── NEBULA ────────────────────────────────────────────────────────────────
const nebulaCanvas=document.createElement('canvas');
nebulaCanvas.width=400;nebulaCanvas.height=700;
const nctx=nebulaCanvas.getContext('2d');
function generateNebula(){
  nctx.fillStyle='#000010';nctx.fillRect(0,0,400,700);
  const colors=['#1a0040','#00102a','#0d0020','#001510','#200010'];
  for(let i=0;i<8;i++){const gx=Math.random()*400,gy=Math.random()*700,gr=Math.random()*200+100;const grad=nctx.createRadialGradient(gx,gy,0,gx,gy,gr);const col=colors[Math.floor(Math.random()*colors.length)];grad.addColorStop(0,col+'cc');grad.addColorStop(1,'transparent');nctx.fillStyle=grad;nctx.fillRect(0,0,400,700);}
}
generateNebula();

// ── STARS ────────────────────────────────────────────────────────────────
const stars=Array.from({length:200},()=>({x:Math.random()*400,y:Math.random()*700,r:Math.random()*1.8+0.2,a:Math.random()*0.9+0.1,sp:Math.random()*0.4+0.05,twinkle:Math.random()*Math.PI*2}));
function updateStars(){stars.forEach(s=>{s.y+=s.sp;s.twinkle+=0.05;if(s.y>700){s.y=0;s.x=Math.random()*400;}});}
function drawBackground(){
  ctx.drawImage(nebulaCanvas,0,0);
  stars.forEach(s=>{const a=s.a*(0.6+Math.sin(s.twinkle)*0.4);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();});
}

// ── SKINS ────────────────────────────────────────────────────────────────
const SKINS=[
  {id:'default',name:'COSMOS',  price:0,   owned:true,  color:'#00eeff',glow:'#00ffff',accent:'#0099bb'},
  {id:'fire',   name:'INFERNO', price:150, owned:false, color:'#ff6600',glow:'#ff4400',accent:'#ffaa00'},
  {id:'purple', name:'PHANTOM', price:300, owned:false, color:'#cc44ff',glow:'#aa00ff',accent:'#ff88ff'},
  {id:'gold',   name:'SOLAR',   price:500, owned:false, color:'#ffd700',glow:'#ffaa00',accent:'#fff4aa'},
  {id:'red',    name:'CRIMSON', price:800, owned:false, color:'#ff1144',glow:'#ff0000',accent:'#ff8899'},
];
let activeSkin=SKINS[0];

const DIFF={
  easy:  {alienSpeed:0.5,fireRate:0.003,rows:3,cols:8,lives:5},
  medium:{alienSpeed:0.9,fireRate:0.006,rows:4,cols:9,lives:3},
  hard:  {alienSpeed:1.4,fireRate:0.010,rows:5,cols:10,lives:2},
};

const PUPS={
  DOUBLE:{label:'DUAL SHOT', color:'#ffaa00',duration:600,icon:'⚡'},
  TRIPLE:{label:'TRI SHOT',  color:'#ff44ff',duration:600,icon:'🔱'},
  SHIELD:{label:'SHIELD',    color:'#00eeff',duration:600,icon:'🛡'},
  SPEED: {label:'HYPERDRIVE',color:'#00ff88',duration:600,icon:'💨'},
  RAPID: {label:'RAPID FIRE',color:'#ff4466',duration:600,icon:'🔥'},
  CHANCE:{label:'LUCKY x2',  color:'#ffd700',duration:600,icon:'🍀'},
};
let activePowerups={},droppingPups=[];

// ── STATES ───────────────────────────────────────────────────────────────
const S={LOADING:6,MENU:0,PLAYING:1,GAMEOVER:2,LEVELCLEAR:3,WIN:4,SHOP:5,BOSSENTRY:7,PAUSED:8};
let state=S.LOADING;
let prevState=S.PLAYING; // state before pause

// ── COMBO / FLOATS ────────────────────────────────────────────────────────
let combo=0,comboTimer=0,comboMax=0,floatingTexts=[],bulletTrails=[];

// ── LOADING ──────────────────────────────────────────────────────────────
let loadTimer=0,logoScale=0,logoAlpha=0,taglineAlpha=0,loadBarProgress=0,loadFadeOut=0;
const loadAliens=Array.from({length:12},()=>({x:Math.random()*400,y:Math.random()*700,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*1.5,type:Math.floor(Math.random()*3),size:Math.random()*0.5+0.4,alpha:Math.random()*0.3+0.1}));
function easeOut(t){return 1-(1-t)*(1-t);}
function updateLoading(){
  loadTimer++;
  loadAliens.forEach(a=>{a.x+=a.vx;a.y+=a.vy;if(a.x<-50)a.x=450;if(a.x>450)a.x=-50;if(a.y<-50)a.y=750;if(a.y>750)a.y=-50;});
  if(loadTimer<=60){logoScale=easeOut(loadTimer/60)*1.05;logoAlpha=loadTimer/60;}
  if(loadTimer>60&&loadTimer<=100){logoScale=1.05-(loadTimer-60)/40*0.05;taglineAlpha=(loadTimer-60)/40;}
  if(loadTimer>100&&loadTimer<=220){loadBarProgress=(loadTimer-100)/120;}
  if(loadTimer>220){loadFadeOut=(loadTimer-220)/40;if(loadFadeOut>=1){state=S.MENU;loadFadeOut=0;}}
}

// ── BOSS ─────────────────────────────────────────────────────────────────
let boss=null,bossEntryTimer=0,bossWarningAlpha=0;
function spawnBoss(lvl){
  const easy=diffKey==='easy';
  const hp=easy?(20+lvl*6):(40+lvl*15);
  const spd=easy?(1.2+lvl*0.2):(2.2+lvl*0.5);
  const fr=easy?Math.max(70-lvl*2,45):Math.max(40-lvl*3,15);
  boss={x:130,y:-120,w:140,h:80,hp,maxHp:hp,vx:spd,vy:0,targetY:80,arrived:false,fireTimer:0,fireRate:fr,flashTimer:0,dashTimer:0,dashCooldown:easy?350:200};
}

// ── GAME VARS ────────────────────────────────────────────────────────────
let player,bullets,alienBullets,aliens,bossBullets,explosions;
let score,totalCoins,lives,level,alienDir,diffKey;
let shootCD=0,keys={},mouse={x:-1,y:-1},levelClearTimer=0;

function initGame(){
  const d=DIFF[diffKey];
  player={x:175,y:635,w:50,h:30,speed:5};
  bullets=[];alienBullets=[];bossBullets=[];explosions=[];
  droppingPups=[];activePowerups={};floatingTexts=[];bulletTrails=[];
  score=0;lives=d.lives;level=1;alienDir=1;boss=null;
  combo=0;comboTimer=0;comboMax=0;
  spawnAliens();
}
function spawnAliens(){
  const d=DIFF[diffKey];aliens=[];
  const rows=Math.min(d.rows+Math.floor((level-1)*0.7),7);
  const cols=Math.min(d.cols+Math.floor((level-1)*0.3),12);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)aliens.push({x:18+c*46,y:80+r*52,w:36,h:28,type:r%3,alive:true});
}
function isBossLevel(){return level%3===0;}

// ── ALIEN DRAW ────────────────────────────────────────────────────────────
const ALIEN_COLORS=[
  ['#ff2255','#ff88aa','#ffccdd'],
  ['#00ffaa','#00cc88','#aaffee'],
  ['#ffaa00','#ff6600','#ffeeaa'],
];
let alienAnimTick=0;
function drawAlienAt(x,y,type,size,alpha){
  const t=alienAnimTick;
  const [c1,c2,c3]=ALIEN_COLORS[type];
  const w=36*size,h=28*size;
  ctx.globalAlpha=alpha;
  ctx.shadowBlur=12*size; ctx.shadowColor=c1;
  if(type===0){
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.roundRect(x+6*size,y+6*size,w-12*size,h-10*size,4*size);ctx.fill();
    ctx.fillRect(x+10*size,y+1*size,4*size,6*size);ctx.fillRect(x+w-14*size,y+1*size,4*size,6*size);
    ctx.fillRect(x,y+10*size,7*size,5*size);ctx.fillRect(x+w-7*size,y+10*size,7*size,5*size);
    const legOff=Math.sin(t*0.15)*2*size;
    ctx.fillRect(x+4*size,y+h-4*size,3*size,5*size+legOff);
    ctx.fillRect(x+10*size,y+h-4*size,3*size,5*size-legOff);
    ctx.fillRect(x+w-13*size,y+h-4*size,3*size,5*size+legOff);
    ctx.fillRect(x+w-7*size,y+h-4*size,3*size,5*size-legOff);
    ctx.fillStyle=c3;ctx.shadowBlur=6;ctx.shadowColor='#ffffff';
    ctx.beginPath();ctx.arc(x+11*size,y+11*size,3.5*size,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w-11*size,y+11*size,3.5*size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(x+11*size,y+11*size,1.8*size,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w-11*size,y+11*size,1.8*size,0,Math.PI*2);ctx.fill();
  } else if(type===1){
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.45,w/2-2*size,h*0.42,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<4;i++){
      const wave=Math.sin(t*0.12+i*1.2)*3*size;
      ctx.fillStyle=i%2===0?c1:c2;
      ctx.beginPath();ctx.ellipse(x+6*size+i*8*size,y+h-4*size+wave,2.5*size,5*size,0,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle=c3+'88';
    ctx.beginPath();ctx.ellipse(x+w/2-4*size,y+h*0.3,7*size,5*size,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c3;ctx.shadowBlur=8;ctx.shadowColor=c3;
    ctx.beginPath();ctx.arc(x+w/2-7*size,y+h*0.42,4*size,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w/2+7*size,y+h*0.42,4*size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#001a00';
    ctx.beginPath();ctx.arc(x+w/2-7*size,y+h*0.42,2*size,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w/2+7*size,y+h*0.42,2*size,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle=c2;
    ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.7,w/2,h*0.28,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c1;
    ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.52,w/3.5,h*0.36,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c3+'cc';
    ctx.beginPath();ctx.ellipse(x+w/2,y+h*0.46,w/6,h*0.22,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<4;i++){
      const ang=(t*0.1+i*Math.PI/2);
      const lx=x+w/2+Math.cos(ang)*14*size,ly=y+h*0.68+Math.sin(ang)*3*size;
      ctx.fillStyle=i%2===0?'#ffff00':'#ff4400';
      ctx.shadowBlur=8;ctx.shadowColor=i%2===0?'#ffff00':'#ff4400';
      ctx.beginPath();ctx.arc(lx,ly,2.5*size,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}
function drawAlien(a){if(!a.alive)return;alienAnimTick++;drawAlienAt(a.x,a.y,a.type,1,1);}

function drawPlayer(){
  const sk=activeSkin,{x,y,w,h}=player;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(x+w/2,y+h+i*6,4-i,0,Math.PI*2);ctx.fillStyle=`rgba(255,200,0,${0.4-i*0.12})`;ctx.fill();}
  if(activePowerups.SHIELD){const pulse=Math.sin(Date.now()*0.01)*0.3+0.7;ctx.beginPath();ctx.arc(x+w/2,y+h/2,40,0,Math.PI*2);ctx.strokeStyle=`rgba(0,238,255,${pulse})`;ctx.lineWidth=2.5;ctx.shadowBlur=20;ctx.shadowColor='#00eeff';ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle=`rgba(0,238,255,${pulse*0.08})`;ctx.fill();}
  ctx.shadowBlur=22;ctx.shadowColor=sk.glow;ctx.fillStyle=sk.color;
  ctx.beginPath();ctx.moveTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w*.7,y+h*.75);ctx.lineTo(x+w*.3,y+h*.75);ctx.lineTo(x,y+h);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffffffaa';ctx.beginPath();ctx.ellipse(x+w/2,y+h*.4,7,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sk.accent;
  ctx.beginPath();ctx.moveTo(x+w*.3,y+h*.75);ctx.lineTo(x,y+h);ctx.lineTo(x+w*.15,y+h*.6);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+w*.7,y+h*.75);ctx.lineTo(x+w,y+h);ctx.lineTo(x+w*.85,y+h*.6);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
}

function drawBullets(){
  bulletTrails=bulletTrails.filter(t=>t.life>0);
  bulletTrails.forEach(t=>{ctx.globalAlpha=t.life/t.maxLife*0.5;ctx.fillStyle=t.color;ctx.fillRect(t.x-1,t.y,2,6);t.y+=3;t.life--;});
  ctx.globalAlpha=1;
  bullets.forEach(b=>{
    ctx.shadowBlur=10;ctx.shadowColor=activeSkin.glow;
    const grad=ctx.createLinearGradient(b.x,b.y-12,b.x,b.y+4);
    grad.addColorStop(0,'#ffffff');grad.addColorStop(1,activeSkin.color);
    ctx.fillStyle=grad;ctx.fillRect(b.x-2,b.y-12,4,16);ctx.shadowBlur=0;
    bulletTrails.push({x:b.x,y:b.y,color:activeSkin.color,life:8,maxLife:8});
  });
}
function drawBullet(b,color){ctx.shadowBlur=8;ctx.shadowColor=color;ctx.fillStyle=color;ctx.fillRect(b.x-2,b.y-8,4,14);ctx.shadowBlur=0;}
function drawBossBullet(b){ctx.shadowBlur=14;ctx.shadowColor='#ff00ff';const grad=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,7);grad.addColorStop(0,'#ffffff');grad.addColorStop(0.5,'#ff44ff');grad.addColorStop(1,'transparent');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(b.x,b.y,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}

function drawBoss(){
  if(!boss)return;
  const {x,y,w,h,hp,maxHp,flashTimer}=boss;const cx=x+w/2;
  const enraged=hp/maxHp<0.3;const pulse=Math.sin(Date.now()*0.005)*0.4+0.6;
  ctx.shadowBlur=30+pulse*20;ctx.shadowColor=enraged?'#ff4400':'#aa00ff';
  ctx.fillStyle=flashTimer>0?'#ffffff':(enraged?'#ff2200':'#ff44ff');
  ctx.beginPath();ctx.moveTo(x+20,y+10);ctx.lineTo(x+w-20,y+10);ctx.lineTo(x+w,y+35);ctx.lineTo(x+w-10,y+h);ctx.lineTo(x+10,y+h);ctx.lineTo(x,y+35);ctx.closePath();ctx.fill();
  ctx.fillStyle=flashTimer>0?'#ffffff':(enraged?'#cc1100':'#8800cc');
  ctx.beginPath();ctx.moveTo(x,y+35);ctx.lineTo(x-45,y+65);ctx.lineTo(x-35,y+82);ctx.lineTo(x+10,y+h);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+w,y+35);ctx.lineTo(x+w+45,y+65);ctx.lineTo(x+w+35,y+82);ctx.lineTo(x+w-10,y+h);ctx.closePath();ctx.fill();
  ctx.shadowBlur=15;ctx.shadowColor='#ff0000';ctx.fillStyle=flashTimer>0?'#fff':'#ff2200';
  ctx.beginPath();ctx.arc(cx-25,y+35,11,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+25,y+35,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(cx-25,y+35,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+25,y+35,5,0,Math.PI*2);ctx.fill();
  if(enraged){for(let i=0;i<6;i++){const fx=x+15+i*23+Math.sin(Date.now()*0.01+i)*5;ctx.fillStyle=`rgba(255,${Math.floor(Math.random()*80)},0,0.8)`;ctx.beginPath();ctx.arc(fx,y+h+Math.random()*15,5+Math.random()*6,0,Math.PI*2);ctx.fill();}}
  ctx.shadowBlur=0;
  const bx=x-15,by=y-22,bw=w+30,bh=12;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx-2,by-2,bw+4,bh+4);ctx.fillStyle='#1a0020';ctx.fillRect(bx,by,bw,bh);
  const hpPct=hp/maxHp;const hpGrad=ctx.createLinearGradient(bx,by,bx+bw,by);
  if(hpPct>0.5){hpGrad.addColorStop(0,'#00ff88');hpGrad.addColorStop(1,'#00aaff');}
  else if(hpPct>0.3){hpGrad.addColorStop(0,'#ffaa00');hpGrad.addColorStop(1,'#ff6600');}
  else{hpGrad.addColorStop(0,'#ff2200');hpGrad.addColorStop(1,'#ff6600');}
  ctx.fillStyle=hpGrad;ctx.fillRect(bx,by,bw*hpPct,bh);
  ctx.strokeStyle='#ff44ff';ctx.lineWidth=1.5;ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#ffffff';ctx.font='bold 10px Orbitron,monospace';ctx.textAlign='center';ctx.fillText('BOSS '+hp+'/'+maxHp,cx,by-4);ctx.textAlign='left';
  if(boss.flashTimer>0)boss.flashTimer--;
}

function btn(label,x,y,w,h,color,fontSize=18){
  const hover=mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
  ctx.shadowBlur=hover?25:10;ctx.shadowColor=color;
  ctx.fillStyle=hover?color+'44':'rgba(0,0,20,0.7)';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=color;ctx.lineWidth=hover?2:1.5;ctx.strokeRect(x,y,w,h);
  const cs=8;ctx.fillStyle=color;
  ctx.fillRect(x,y,cs,2);ctx.fillRect(x,y,2,cs);ctx.fillRect(x+w-cs,y,cs,2);ctx.fillRect(x+w-2,y,2,cs);
  ctx.fillRect(x,y+h-2,cs,2);ctx.fillRect(x,y+h-cs,2,cs);ctx.fillRect(x+w-cs,y+h-2,cs,2);ctx.fillRect(x+w-2,y+h-cs,2,cs);
  ctx.shadowBlur=0;ctx.fillStyle=hover?'#ffffff':color;
  ctx.font=`bold ${fontSize}px Orbitron,monospace`;ctx.textAlign='center';ctx.fillText(label,x+w/2,y+h/2+fontSize/3);
}

  if(taglineAlpha>0){ctx.globalAlpha=taglineAlpha*(1-loadFadeOut);ctx.fillStyle='rgba(255,0,255,0.1)';ctx.strokeStyle='#ff44ff88';ctx.lineWidth=1;ctx.fillRect(80,380,240,34);ctx.strokeRect(80,380,240,34);ctx.fillStyle='#ffaaff';ctx.font='bold 13px Orbitron,monospace';ctx.fillText('✦  PRO  EDITION  ✦',200,403);ctx.globalAlpha=taglineAlpha*0.6*(1-loadFadeOut);ctx.fillStyle='#7788aa';ctx.font='11px Orbitron,monospace';ctx.fillText('DEFEND THE GALAXY',200,440);}

  ctx.restore();if(loadFadeOut>0){ctx.fillStyle=`rgba(0,0,10,${loadFadeOut})`;ctx.fillRect(0,0,800,600);}
}

// ── PAUSE TOGGLE ──────────────────────────────────────────────────────────
let pausedAt=0;
function togglePause(){
  if(state===S.PLAYING){
    prevState=state;state=S.PAUSED;
    stopBossMusic();
    pausedAt=performance.now();
  } else if(state===S.PAUSED){
    state=S.PLAYING;
    if(boss)startBossMusic();
    // Re-enable touch overlay
    touchOverlay.style.pointerEvents='all';
    requestAnimationFrame(loop);
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────
function update(){
  updateStars();
  if(state===S.LOADING){updateLoading();return;}
  if(state===S.BOSSENTRY||state===S.PAUSED)return;
  if(state===S.LEVELCLEAR){
    levelClearTimer++;
    if(levelClearTimer>=180){
      levelClearTimer=0;bullets=[];alienBullets=[];bossBullets=[];explosions=[];droppingPups=[];activePowerups={};bulletTrails=[];alienDir=1;boss=null;stopBossMusic();
      if(isBossLevel()){state=S.BOSSENTRY;bossEntryTimer=0;bossWarningAlpha=0;playBossAlert();}
      else{spawnAliens();state=S.PLAYING;playLevelUp();}
    }
    return;
  }
  if(state!==S.PLAYING)return;
  const d=DIFF[diffKey];
  Object.keys(activePowerups).forEach(k=>{activePowerups[k]--;if(activePowerups[k]<=0)delete activePowerups[k];});
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0;}
  const spd=activePowerups.SPEED?player.speed*1.8:player.speed;
  // Touch: move player toward finger position
  if(mobileMode && touchX!==null){
    const targetX = touchX - player.w/2;
    const diff = targetX - player.x;
    if(Math.abs(diff)>2) player.x += Math.sign(diff)*Math.min(Math.abs(diff), spd*2.5);
    player.x = Math.max(0, Math.min(player.x, 400-player.w));
  } else {
    if((keys['ArrowLeft']||mKeys.left)&&player.x>0)player.x-=spd;
    if((keys['ArrowRight']||mKeys.right)&&player.x+player.w<400)player.x+=spd;
  }
  const rapidCD=activePowerups.RAPID?7:18;
  shootCD--;
  if((keys['Space']||mKeys.fire)&&shootCD<=0){
    const cx=player.x+player.w/2,cy=player.y;
    if(activePowerups.TRIPLE){bullets.push({x:cx,y:cy},{x:cx-15,y:cy+8},{x:cx+15,y:cy+8});}
    else if(activePowerups.DOUBLE){bullets.push({x:cx-10,y:cy},{x:cx+10,y:cy});}
    else{bullets.push({x:cx,y:cy});}
    playShoot();shootCD=rapidCD;
  }
  bullets=bullets.filter(b=>b.y>0);bullets.forEach(b=>b.y-=9);
  alienBullets=alienBullets.filter(b=>b.y<700);alienBullets.forEach(b=>b.y+=5);
  bossBullets=bossBullets.filter(b=>b.y<720&&b.x>-20&&b.x<420);bossBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  droppingPups=droppingPups.filter(p=>p.y<720);droppingPups.forEach(p=>p.y+=2);
  droppingPups.forEach((p,pi)=>{if(p.x>player.x&&p.x<player.x+player.w&&p.y>player.y&&p.y<player.y+player.h){activePowerups[p.type]=PUPS[p.type].duration;droppingPups.splice(pi,1);playPowerup();addFloatingText(p.x,p.y-20,PUPS[p.type].icon+' '+PUPS[p.type].label,PUPS[p.type].color);}});

  if(boss){
    if(!boss.arrived){boss.y+=2;if(boss.y>=boss.targetY)boss.arrived=true;}
    else{
      boss.x+=boss.vx;if(boss.x<=5||boss.x+boss.w>=395)boss.vx*=-1;
      const enraged=boss.hp/boss.maxHp<0.3,halfHp=boss.hp/boss.maxHp<0.5;
      if(enraged){boss.y+=Math.sin(Date.now()*0.003)*1.8;boss.y=Math.max(40,Math.min(boss.y,160));}
      boss.dashTimer++;if(boss.dashTimer>=boss.dashCooldown){boss.dashTimer=0;const dir=player.x>boss.x+boss.w/2?1:-1;boss.vx=dir*(enraged?13:8);}
      boss.fireTimer++;
      const fr=enraged?Math.max(boss.fireRate-15,10):halfHp?Math.max(boss.fireRate-8,18):boss.fireRate;
      if(boss.fireTimer>=fr){
        boss.fireTimer=0;const cx=boss.x+boss.w/2,cy=boss.y+boss.h;const easy=diffKey==='easy';
        if(enraged&&!easy){for(let a=-2;a<=2;a++){const ang=Math.PI/2+a*0.28;bossBullets.push({x:cx,y:cy,vx:Math.cos(ang)*5,vy:Math.sin(ang)*5});}const dx=player.x+player.w/2-cx,dy=player.y-cy,dist=Math.sqrt(dx*dx+dy*dy);bossBullets.push({x:cx,y:cy,vx:dx/dist*6,vy:dy/dist*6});}
        else if((halfHp&&!easy)||enraged){for(let a=-1;a<=1;a++){const ang=Math.PI/2+a*0.25;bossBullets.push({x:cx,y:cy,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4});}}
        else{bossBullets.push({x:cx,y:cy,vx:0,vy:5});}
      }
    }
    bossBullets.forEach((b,bi)=>{if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){if(activePowerups.SHIELD){bossBullets.splice(bi,1);return;}bossBullets.splice(bi,1);lives--;playPlayerHit();combo=0;comboTimer=0;if(lives<=0){stopBossMusic();state=S.GAMEOVER;}}});
    bullets.forEach((b,bi)=>{
      if(boss&&b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){
        bullets.splice(bi,1);boss.hp--;boss.flashTimer=5;playBossHit();
        const coinMult=activePowerups.CHANCE?2:1;totalCoins+=2*coinMult;score+=50*level;
        if(Math.random()<0.12)dropPowerup(boss.x+boss.w/2,boss.y+boss.h,2);
        if(boss.hp<=0){
          stopBossMusic();
          for(let i=0;i<6;i++)setTimeout(()=>{spawnExplosion(130+Math.random()*140,80+Math.random()*80,'#ff44ff',28,9);playExplosion(true);},i*110);
          spawnExplosion(boss.x+boss.w/2,boss.y+boss.h/2,'#ffffff',40,12);
          for(let i=0;i<3;i++){const types=Object.keys(PUPS);const type=types[Math.floor(Math.random()*types.length)];droppingPups.push({x:boss.x+boss.w/2+(i-1)*45,y:boss.y+boss.h,type,color:PUPS[type].color,icon:PUPS[type].icon});}
          score+=500*level;totalCoins+=Math.floor(30*level*(activePowerups.CHANCE?2:1));
          addFloatingText(boss.x+boss.w/2,boss.y,'BOSS DEFEATED! +'+500*level,'#ffd700');
          boss=null;level++;if(level>8){state=S.WIN;return;}state=S.LEVELCLEAR;levelClearTimer=0;
        }
      }
    });
    explosions.forEach(e=>{e.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});e.particles=e.particles.filter(p=>p.life>0);});explosions=explosions.filter(e=>e.particles.length>0);
    return;
  }

  const alive=aliens.filter(a=>a.alive);
  if(alive.length===0){totalCoins+=Math.floor(score*0.1);level++;if(level>8){state=S.WIN;return;}state=S.LEVELCLEAR;levelClearTimer=0;return;}
  const speedMult=1+(1-alive.length/aliens.length)*1.8+(level-1)*0.25;let edge=false;
  alive.forEach(a=>{a.x+=d.alienSpeed*alienDir*speedMult;if(a.x<=5||a.x+a.w>=395)edge=true;});
  if(edge){alienDir*=-1;alive.forEach(a=>a.y+=18);}
  alive.forEach(a=>{if(Math.random()<d.fireRate*(1+(level-1)*0.15))alienBullets.push({x:a.x+a.w/2,y:a.y+a.h});});
  bullets.forEach((b,bi)=>{
    aliens.forEach(a=>{
      if(!a.alive)return;
      if(b.x>a.x&&b.x<a.x+a.w&&b.y>a.y&&b.y<a.y+a.h){
        a.alive=false;bullets.splice(bi,1);const coinMult=activePowerups.CHANCE?2:1;
        const pts=(a.type===2?30:a.type===1?20:10)*level;combo++;comboTimer=120;if(combo>comboMax)comboMax=combo;
        score+=pts+Math.floor(pts*Math.min(combo*0.1,1));totalCoins+=(a.type===2?3:a.type===1?2:1)*coinMult;
        spawnExplosion(a.x+a.w/2,a.y+a.h/2,ALIEN_COLORS[a.type][0]);playExplosion(false);
        if(combo>1)addFloatingText(a.x+a.w/2,a.y,'x'+combo+' COMBO!',combo>5?'#ff4466':combo>3?'#ffaa00':'#00ff88');
        dropPowerup(a.x+a.w/2,a.y);
      }
    });
  });
  alienBullets.forEach((b,bi)=>{if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){if(activePowerups.SHIELD){alienBullets.splice(bi,1);return;}alienBullets.splice(bi,1);lives--;playPlayerHit();combo=0;comboTimer=0;if(lives<=0)state=S.GAMEOVER;}});
  alive.forEach(a=>{if(a.y+a.h>=player.y)state=S.GAMEOVER;});
  explosions.forEach(e=>{e.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});e.particles=e.particles.filter(p=>p.life>0);});explosions=explosions.filter(e=>e.particles.length>0);
}

// ── INPUT ────────────────────────────────────────────────────────────────
// ── TOUCH / MOBILE INPUT ─────────────────────────────────────────────────
let mKeys={left:false,right:false,fire:false};
let touchX=null; // current touch X on canvas
let autoFireInterval=null;
let touchActive=false;

function startAutoFire(){
  if(autoFireInterval) return;
  mKeys.fire=true;
  autoFireInterval=setInterval(()=>{ mKeys.fire=true; setTimeout(()=>mKeys.fire=false,50); },220);
}
function stopAutoFire(){
  mKeys.fire=false;
  if(autoFireInterval){clearInterval(autoFireInterval);autoFireInterval=null;}
}

// Draw touch guide on canvas (called inside game loop)
function drawTouchGuide(){
  if(!mobileMode||state!==S.PLAYING) return;
  if(touchX===null) return;
  // Show a glowing vertical line where finger is
  const tx = touchX;
  ctx.save();
  ctx.globalAlpha=0.35;
  ctx.strokeStyle=activeSkin.color;
  ctx.lineWidth=2;
  ctx.setLineDash([6,6]);
  ctx.beginPath();ctx.moveTo(tx,60);ctx.lineTo(tx,660);ctx.stroke();
  ctx.setLineDash([]);
  // Circle at bottom
  ctx.beginPath();ctx.arc(tx,645,18,0,Math.PI*2);
  ctx.strokeStyle=activeSkin.glow;ctx.lineWidth=2;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.restore();
}

// Touch events on the overlay
touchOverlay.addEventListener('touchstart',ev=>{
  ev.preventDefault();resumeAC();
  if(state===S.PAUSED||state===S.MENU||state===S.GAMEOVER||state===S.WIN||state===S.SHOP||state===S.LEVELCLEAR) {
    touchOverlay.style.pointerEvents='none';
    return;
  }
  touchActive=true;
  const t=ev.touches[0];
  const rect=canvas.getBoundingClientRect();
  touchX=(t.clientX-rect.left)/scale;
  startAutoFire();
},{passive:false});

touchOverlay.addEventListener('touchmove',ev=>{
  ev.preventDefault();
  if(!touchActive) return;
  const t=ev.touches[0];
  const rect=canvas.getBoundingClientRect();
  const newX=(t.clientX-rect.left)/scale;
  if(newX<touchX-4) mKeys.left=true, mKeys.right=false;
  else if(newX>touchX+4) mKeys.right=true, mKeys.left=false;
  else mKeys.left=false, mKeys.right=false;
  touchX=newX;
},{passive:false});

touchOverlay.addEventListener('touchend',ev=>{
  ev.preventDefault();
  touchActive=false;touchX=null;
  mKeys.left=false;mKeys.right=false;
  stopAutoFire();
  touchOverlay.style.pointerEvents='all';
},{passive:false});

// Mobile pause/menu buttons
mPauseBtn.addEventListener('touchstart',ev=>{ev.preventDefault();resumeAC();togglePause();},{passive:false});
mPauseBtn.addEventListener('click',()=>{resumeAC();togglePause();});
mMenuBtn.addEventListener('touchstart',ev=>{ev.preventDefault();resumeAC();stopBossMusic();stopAutoFire();state=S.MENU;},{passive:false});
mMenuBtn.addEventListener('click',()=>{resumeAC();stopBossMusic();stopAutoFire();state=S.MENU;});

// Show/hide mobile buttons based on mode
function updateMobileUI(){
  if(mobileMode){
    touchOverlay.classList.add('active');
  } else {
    touchOverlay.classList.remove('active');
  }
  mPauseBtn.style.display='none';
  mMenuBtn.style.display='none';
}

function showMobileButtons(show){
  if(!mobileMode) return;
  const d = show ? 'flex' : 'none';
  mPauseBtn.style.display = d;
  mMenuBtn.style.display = d;
  // Only allow touch overlay during gameplay
  touchOverlay.style.pointerEvents = show ? 'all' : 'none';
}
updateMobileUI();

function getCanvasPos(e){
  const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)/scale, y:(e.clientY-r.top)/scale};
}
canvas.addEventListener('mousemove',e=>{const p=getCanvasPos(e);mouse.x=p.x;mouse.y=p.y;});

// Touch tap on canvas for menu/shop buttons
canvas.addEventListener('touchstart',e=>{
  if(state===S.PLAYING||state===S.BOSSENTRY) return;
  e.preventDefault();resumeAC();
  const p=getCanvasPos(e.touches[0]);
  mouse.x=p.x;mouse.y=p.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(state===S.PLAYING||state===S.BOSSENTRY) return;
  e.preventDefault();resumeAC();
  const t=e.changedTouches[0];
  const p=getCanvasPos(t);
  mouse.x=p.x;mouse.y=p.y;
  // Simulate click
  canvas.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true}));
},{passive:false});
canvas.addEventListener('click',e=>{
  resumeAC();const p=getCanvasPos(e);mouse.x=p.x;mouse.y=p.y;
  if(state===S.LOADING||state===S.BOSSENTRY)return;

  // HUD pause/home buttons
  // HUD buttons removed - use mobile overlay buttons
  if(state===S.PAUSED){
    if(isClick(60,315,280,50)){togglePause();return;}
    if(isClick(60,378,280,50)){stopBossMusic();state=S.MENU;return;}
    if(isClick(60,441,280,50)){diffKey=diffKey;initGame();state=S.PLAYING;return;}
  }
  if(state===S.MENU){
    menuBtns.forEach(b=>{if(isClick(30,b.y-30,340,50)){diffKey=b.key;initGame();state=S.PLAYING;}});
    if(isClick(30,500,155,42))state=S.SHOP;
    if(isClick(215,500,155,42)){mobileMode=!mobileMode;updateMobileUI();}
  } else if(state===S.SHOP){
    SKINS.forEach((sk,i)=>{const bx=10,by=72+i*116;if(sk.owned&&sk.id!==activeSkin.id&&isClick(bx+82,by+62,110,30))activeSkin=sk;if(!sk.owned&&totalCoins>=sk.price&&isClick(bx+82,by+62,110,30)){totalCoins-=sk.price;sk.owned=true;activeSkin=sk;}});
    if(isClick(10,650,120,38))state=S.MENU;
  } else if(state===S.GAMEOVER||state===S.WIN){if(isClick(60,500,280,52))state=S.MENU;}
});

// Keyboard
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space')e.preventDefault();
  if((e.code==='Escape'||e.code==='KeyP')&&(state===S.PLAYING||state===S.PAUSED))togglePause();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Mobile buttons


// ── MAIN LOOP ────────────────────────────────────────────────────────────
totalCoins=0;
function loop(){
  ctx.fillStyle='#000010';ctx.fillRect(0,0,400,700);
  if(state===S.BOSSENTRY){updateStars();drawBossEntry();requestAnimationFrame(loop);return;}
  update();
  if(state===S.LOADING)drawLoading();
  else if(state===S.MENU){drawMenu();showMobileButtons(false);}
  else if(state===S.PLAYING){drawBackground();drawHUD();if(boss)drawBoss();else aliens.forEach(drawAlien);drawPlayer();drawBullets();alienBullets.forEach(b=>drawBullet(b,'#ff4466'));bossBullets.forEach(b=>drawBossBullet(b));drawDroppingPups();drawExplosions();drawTouchGuide();showMobileButtons(true);}
  else if(state===S.PAUSED){drawPause();showMobileButtons(true);return;} // stop loop when paused
  else if(state===S.GAMEOVER){drawOverlay('GAME OVER','#ff4466',['SCORE: '+score,'COINS: '+totalCoins,'BEST COMBO: x'+comboMax]);showMobileButtons(false);}
  else if(state===S.LEVELCLEAR){drawLevelClear();showMobileButtons(false);}
  else if(state===S.WIN){drawOverlay('VICTORY!','#ffd700',['SCORE: '+score,'COINS: '+totalCoins,'BEST COMBO: x'+comboMax]);showMobileButtons(false);}
  else if(state===S.SHOP){drawShop();showMobileButtons(false);}
  requestAnimationFrame(loop);
}
loop();
</script>
